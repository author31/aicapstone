[build-system]
requires = ["uv_build>=0.8.13,<0.9.0"]
build-backend = "uv_build"

[project]
name = "simulator"
version = "0.3.0"
description = "AICapstone simulator config layer on top of upstream leisaac."
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "leisaac",
    "lerobot == 0.4.4"
]

[tool.uv.sources]
leisaac = { git = "https://github.com/LightwheelAI/leisaac.git", subdirectory = "source/leisaac" }
