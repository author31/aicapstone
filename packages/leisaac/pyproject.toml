[build-system]
requires = ["setuptools>=68", "wheel", "toml"]
build-backend = "setuptools.build_meta"

[project]
name = "leisaac"
version = "0.3.0"
description = "AICapstone-specific leisaac extensions."
readme = "README.md"
requires-python = ">=3.10, <3.12"

[tool.setuptools]
include-package-data = true
zip-safe = false

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["leisaac*"]
